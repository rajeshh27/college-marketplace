<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View shop details and browse products on CampusMart.">
  <title>Shop Details — CampusMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/shop-detail.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="page-content">
    <!-- Shop Banner -->
    <div class="shop-banner" id="shopBanner">
      <div class="shop-banner__overlay"></div>
      <div class="shop-banner__content container">
        <a href="shops.html" class="shop-banner__back btn btn--ghost">← Back to Shops</a>
        <div class="shop-banner__info" id="shopInfo">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>

    <div class="container">
      <!-- Products -->
      <div class="section">
        <div class="section__header">
          <div>
            <h2 class="section__title" id="productsTitle">Products</h2>
            <p class="section__subtitle" id="productsSubtitle">Loading...</p>
          </div>
        </div>
        <div class="grid grid--4" id="productGrid">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="footer"></footer>
  <script src="js/common.js"></script>
  <script src="js/shop-detail.js"></script>
</body>
</html>

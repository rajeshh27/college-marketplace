<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with the CampusMart team.">
  <title>Contact Us — CampusMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .contact-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: var(--space-12); padding: var(--space-20) 0; }
    .contact-info { padding: var(--space-10); background: var(--primary); color: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-glow); }
    .contact-info h2 { margin-bottom: var(--space-6); color: white; }
    .contact-item { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-6); }
    .contact-item__icon { width: 44px; height: 44px; background: rgba(255,255,255,0.2); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="container">
    <div class="contact-grid">
      <div class="contact-info" data-animate>
        <h2>Contact Information</h2>
        <p style="margin-bottom: var(--space-8); opacity: 0.9;">Have questions or feedback? We'd love to hear from you. Our team is here to help.</p>
        
        <div class="contact-item">
          <div class="contact-item__icon">📞</div>
          <div>
            <div style="font-weight: 600;">Phone</div>
            <div style="opacity: 0.9;">+91 98765 43210</div>
          </div>
        </div>
        
        <div class="contact-item">
          <div class="contact-item__icon">📧</div>
          <div>
            <div style="font-weight: 600;">Email</div>
            <div style="opacity: 0.9;">support@campusmart.in</div>
          </div>
        </div>
        
        <div class="contact-item">
          <div class="contact-item__icon">🏫</div>
          <div>
            <div style="font-weight: 600;">Location</div>
            <div style="opacity: 0.9;">ACET Campus, Block D, 1st Floor</div>
          </div>
        </div>
      </div>

      <div class="contact-form-wrap" data-animate>
        <h2 class="section__title" style="margin-bottom: var(--space-6);">Send us a message</h2>
        <form class="admin-form" onsubmit="event.preventDefault(); Toast.show('Message sent! We will get back to you soon.', 'success'); this.reset();">
          <div class="grid grid--2">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-input" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-input" placeholder="john@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Subject</label>
            <input type="text" class="form-input" placeholder="How can we help?" required>
          </div>
          <div class="form-group">
            <label class="form-label">Message</label>
            <textarea class="form-input" rows="5" placeholder="Your message here..." required style="resize: none;"></textarea>
          </div>
          <button type="submit" class="btn btn--primary btn--lg">Send Message →</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer" id="footer"></footer>
  <script src="js/common.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => initCommon('contact'));</script>
</body>
</html>

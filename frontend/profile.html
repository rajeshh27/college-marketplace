<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — CampusMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .profile-layout { display: grid; grid-template-columns: 280px 1fr; gap: var(--space-8); padding: var(--space-12) 0; align-items: start; }
    
    /* Sidebar */
    .profile-sidebar { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-xl); overflow: hidden; position: sticky; top: calc(var(--nav-height) + var(--space-6)); }
    .sidebar-user { padding: var(--space-6); background: var(--bg-secondary); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: var(--space-4); }
    .sidebar-user__avatar { width: 50px; height: 50px; border-radius: var(--radius-full); background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .sidebar-menu { padding: var(--space-4) 0; }
    .sidebar-menu__item { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-4) var(--space-6); color: var(--text-secondary); transition: all var(--duration-base); cursor: pointer; }
    .sidebar-menu__item:hover { background: var(--primary-subtle); color: var(--primary); }
    .sidebar-menu__item.active { background: var(--primary-subtle); color: var(--primary); border-left: 4px solid var(--primary); font-weight: var(--fw-bold); }
    
    /* Order Cards */
    .order-section__title { font-family: var(--font-display); font-size: var(--fs-xl); margin-bottom: var(--space-6); display: flex; align-items: center; gap: var(--space-3); }
    .order-item-pro { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: var(--space-6); margin-bottom: var(--space-4); transition: all var(--duration-base); }
    .order-item-pro:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
    
    .order-timeline { display: flex; justify-content: space-between; margin: var(--space-6) 0; position: relative; padding: 0 var(--space-2); }
    .order-timeline::before { content: ''; position: absolute; top: 10px; left: 0; right: 0; height: 2px; background: var(--border-medium); z-index: 0; }
    .timeline-step { position: relative; z-index: 1; text-align: center; font-size: var(--fs-xs); color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .timeline-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--border-medium); border: 4px solid var(--bg-card); transition: all 0.3s; }
    
    .step--active .timeline-dot { background: var(--primary); box-shadow: 0 0 0 4px var(--primary-subtle); }
    .step--active .timeline-label { color: var(--text-primary); font-weight: var(--fw-bold); }
    
    @media (max-width: 960px) {
      .profile-layout { grid-template-columns: 1fr; }
      .profile-sidebar { position: static; }
    }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="page-content">
    <div class="container">
      <div id="loginGate" class="section" style="max-width: 500px; margin: 0 auto; text-align: center;">
        <div class="no-results__icon">🛡️</div>
        <h1 class="page-header__title">Access Your Profile</h1>
        <p class="page-header__subtitle">Securely manage your campus orders.</p>
        <div class="admin-form" style="margin-top: var(--space-8);">
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="trackPhone" class="form-input" placeholder="Enter 10-digit number" maxlength="10">
          </div>
          <button class="btn btn--primary btn--full" onclick="loadMyOrders()">Sign In to Track Orders →</button>
        </div>
      </div>

      <div id="profileContent" class="profile-layout hidden">
        <!-- Sidebar -->
        <aside class="profile-sidebar">
          <div class="sidebar-user">
            <div class="sidebar-user__avatar" id="userInitial">A</div>
            <div>
              <div style="font-size: var(--fs-xs); color: var(--text-muted);">Hello,</div>
              <div style="font-weight: var(--fw-bold); font-size: var(--fs-base);" id="userPhoneDisplay">9876543210</div>
            </div>
          </div>
          <nav class="sidebar-menu">
            <div class="sidebar-menu__item active">📦 My Orders</div>
            <div class="sidebar-menu__item">🏠 Saved Addresses</div>
            <div class="sidebar-menu__item">💳 Payments</div>
            <div class="sidebar-menu__item">⚙️ Settings</div>
            <div class="sidebar-menu__item" onclick="logoutUser()" style="border-top: 1px solid var(--border-light); margin-top: var(--space-4); color: var(--accent-coral);">👋 Logout</div>
          </nav>
        </aside>

        <!-- Main Content -->
        <section class="profile-main">
          <div id="ongoingSection">
            <h2 class="order-section__title">🚚 Ongoing Orders</h2>
            <div id="ongoingOrders">
              <!-- Ongoing orders here -->
            </div>
          </div>

          <div id="historySection" style="margin-top: var(--space-12);">
            <h2 class="order-section__title">🕒 Order History</h2>
            <div id="historyOrders">
              <!-- History orders here -->
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="footer" id="footer"></footer>
  <script src="js/common.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>

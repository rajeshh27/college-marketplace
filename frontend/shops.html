<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all campus shops - food, xerox, cafes, and stationery near you.">
  <title>Browse Shops — CampusMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/shops.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="page-content">
    <div class="container">
      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1 class="page-header__title">Browse Shops</h1>
          <p class="page-header__subtitle">Find everything you need on campus</p>
        </div>
        <div class="search-bar" style="max-width:400px;">
          <span class="search-bar__icon">🔍</span>
          <input type="text" class="search-bar__input" id="shopSearch" placeholder="Search shops...">
        </div>
      </div>

      <!-- Filters -->
      <div class="filters" id="filters">
        <button class="filter-btn active" data-category="all">All Shops</button>
        <button class="filter-btn" data-category="food">🍔 Food</button>
        <button class="filter-btn" data-category="xerox">📄 Xerox</button>
        <button class="filter-btn" data-category="cafe">☕ Cafe</button>
        <button class="filter-btn" data-category="stationery">✏️ Stationery</button>
      </div>

      <!-- Sort -->
      <div class="sort-bar">
        <span class="sort-bar__count" id="shopCount">Loading...</span>
        <div class="sort-bar__options">
          <select class="form-select" id="sortSelect" style="width:auto;">
            <option value="default">Sort by: Default</option>
            <option value="distance">Nearest First</option>
            <option value="delivery">Fastest Delivery</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
      </div>

      <!-- Shop Grid -->
      <div class="grid grid--3" id="shopGrid">
        <!-- Populated dynamically -->
      </div>
    </div>
  </main>

  <footer class="footer" id="footer"></footer>
  <script src="js/common.js"></script>
  <script src="js/shops.js"></script>
</body>
</html>
